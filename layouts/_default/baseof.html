<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ if .Title }}{{ .Title }} • {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  <!-- Tailwind CDN (quick starter) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 leading-relaxed">
  <header class="bg-white shadow">
    <div class="max-w-4xl mx-auto px-4 py-6">
      <a href="{{ "/" | relURL }}" class="text-2xl font-bold">{{ .Site.Title }}</a>
      <p class="text-sm text-gray-600">{{ .Site.Params.description }}</p>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="bg-white border-t mt-12">
    <div class="max-w-4xl mx-auto px-4 py-6 text-sm text-gray-600">
      © {{ now.Format "2006" }} {{ .Site.Title }} — Built with Hugo · Edit via Netlify CMS at <a class="text-blue-600" href="/admin">/admin</a>
    </div>
  </footer>
</body>
</html>
